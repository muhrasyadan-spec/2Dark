<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pendataan JRTea Limbung</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Pendataan JRTea Limbung</h1>
</header>

<div class="container">

    <div class="card">
        <h2>Tambah Data Penjual</h2>

        <form id="sellerForm">
            <input type="text" id="nama" placeholder="Nama Penjual" required>

            <input type="text" id="antrian" placeholder="Nomor Antrian" required>

            <input type="text" id="harga" placeholder="Harga" required>

            <input type="text" id="minuman" placeholder="Jenis Minuman" required>

            <button type="submit">Simpan</button>
        </form>
    </div>

    <div class="card">
        <h2>Data Penjual</h2>

        <table>
            <thead>
                <tr>
                    <th>Nama</th>
                    <th>Antrian</th>
                    <th>Harga</th>
                    <th>Minuman</th>
                    <th>Aksi</th>
                </tr>
            </thead>

            <tbody id="sellerTable">
            </tbody>

        </table>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
